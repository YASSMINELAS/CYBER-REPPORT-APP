version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: cyber-reports
      KEYCLOAK_CLIENT_ID: cyber-reports-client
      KEYCLOAK_CLIENT_SECRET: 
    depends_on:
      - keycloak
    networks:
      - app-network

networks:
  app-network:
    driver: bridge